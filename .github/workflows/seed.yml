name: Seed Recipes Database

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Which seed to run'
        required: true
        default: 'seed_v3'
        type: choice
        options:
          - seed
          - seed_v2
          - seed_v3

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Run seed endpoint
        run: |
          ENDPOINT="${{ github.event.inputs.endpoint }}"
          echo "Calling /api/$ENDPOINT..."
          response=$(curl -s -w "\n%{http_code}" -X POST "https://project-f8nhl.vercel.app/api/$ENDPOINT" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          echo "HTTP Status: $http_code"
          if [ "$http_code" -ne 200 ]; then
            echo "FAILED: $ENDPOINT returned $http_code"
            exit 1
          fi
