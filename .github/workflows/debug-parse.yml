name: Debug Recipe Parse

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test Gemini parse directly
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT='You are a recipe parser. Return ONLY raw JSON starting with { and ending with }. Parse this recipe: Party Ribs. Ingredients: 2 racks pork baby back ribs, Meat Church Holy Voodoo seasoning, 1 stick butter, 10 oz hot honey. Steps: Prepare smoker to 275F. Slice each rib individually. Season with hot sauce and Holy Voodoo, let adhere 15 min. Smoke on wire racks until mahogany and 185F internal, about 90 min. Toss in pan with butter and hot honey. Cover with foil and return to smoker until probe tender, about 30 more min. Toss in sauce, remove from pan, cool and serve. JSON shape: {"title":"...","category":"Beef & Pork","serves":"...","time":"...","ingredients":[{"amount":"...","name":"..."}],"steps":["..."],"notes":""}'

          response=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}],\"generationConfig\":{\"temperature\":0.1,\"responseMimeType\":\"application/json\"}}")

          echo "=== FULL RESPONSE ==="
          echo "$response" | python3 -m json.tool 2>/dev/null || echo "$response"

          echo "=== EXTRACTED TEXT ==="
          echo "$response" | python3 -c "
import sys, json
data = json.load(sys.stdin)
candidates = data.get('candidates', [])
if candidates:
    text = candidates[0].get('content', {}).get('parts', [{}])[0].get('text', 'NO TEXT')
    print('TEXT:', repr(text[:1000]))
    # Try to parse as JSON
    try:
        parsed = json.loads(text)
        print('VALID JSON:', json.dumps(parsed, indent=2)[:500])
    except Exception as e:
        print('JSON PARSE ERROR:', e)
else:
    print('NO CANDIDATES - finish_reason:', data)
" 2>&1